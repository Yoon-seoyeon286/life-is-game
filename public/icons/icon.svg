<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#0a0a0f"/>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#3b1f6e"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
  </defs>
  <!-- Sword -->
  <g transform="translate(256,256)">
    <!-- Blade -->
    <polygon points="0,-160 14,-60 -14,-60" fill="#c4b5fd" opacity="0.95"/>
    <!-- Guard -->
    <rect x="-40" y="-48" width="80" height="18" rx="6" fill="#7c3aed"/>
    <!-- Handle -->
    <rect x="-10" y="-30" width="20" height="70" rx="5" fill="#a78bfa"/>
    <!-- Pommel -->
    <circle cx="0" cy="50" r="14" fill="#7c3aed"/>
    <!-- Glow -->
    <ellipse cx="0" cy="-110" rx="8" ry="30" fill="#e9d5ff" opacity="0.4"/>
  </g>
  <!-- Stars -->
  <circle cx="100" cy="100" r="3" fill="#a78bfa" opacity="0.7"/>
  <circle cx="400" cy="130" r="2" fill="#c4b5fd" opacity="0.5"/>
  <circle cx="80" cy="380" r="2.5" fill="#a78bfa" opacity="0.6"/>
  <circle cx="430" cy="370" r="3" fill="#c4b5fd" opacity="0.5"/>
</svg>
